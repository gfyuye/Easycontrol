name: Build VLC Android APK

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'VLC Android version tag'
        required: true
        default: '3.7.1'
        type: string
      abi:
        description: 'Target ABI'
        required: true
        default: 'arm64'
        type: choice
        options:
          - arm64
          - arm
          - x86
          - x86_64
      release_title:
        description: 'Package description (optional)'
        required: false
        type: string
        default: ''

jobs:
  build:
    runs-on: ubuntu-22.04
    permissions:
      contents: read
      packages: write
    
    steps:
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'
        
    - name: Install build dependencies
      run: |
        sudo apt update
        sudo apt install -y automake ant autopoint cmake build-essential \
          libtool-bin patch pkg-config protobuf-compiler ragel subversion \
          unzip git flex python3 wget gettext autoconf-archive \
          ninja-build nasm yasm gawk

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3
      with:
        cmdline-tools-version: 'latest'
        accept-android-sdk-licenses: true
        
    - name: Install Android SDK components
      run: |
        yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses
        $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager "platforms;android-34" "build-tools;34.0.0" "platform-tools"
        echo "ANDROID_HOME=$ANDROID_HOME" >> $GITHUB_ENV
        echo "ANDROID_SDK_ROOT=$ANDROID_HOME" >> $GITHUB_ENV
        
    - name: Setup Android NDK
      run: |
        echo "Setting up Android NDK r26d..."
        wget -q https://dl.google.com/android/repository/android-ndk-r26d-linux.zip
        unzip -q android-ndk-r26d-linux.zip
        echo "ANDROID_NDK=${GITHUB_WORKSPACE}/android-ndk-r26d" >> $GITHUB_ENV
        echo "ANDROID_NDK_HOME=${GITHUB_WORKSPACE}/android-ndk-r26d" >> $GITHUB_ENV
        rm android-ndk-r26d-linux.zip

    - name: Create keystore from secrets
      run: |
        echo "=== 从 Secrets 创建密钥文件 ==="
        echo "${{ secrets.SIGNING_KEYSTORE_FILE }}" | base64 -d > keystore.jks
        echo "密钥文件大小: $(wc -c < keystore.jks) 字节"
        
        # 验证密钥文件
        if keytool -list -keystore keystore.jks -storepass "${{ secrets.SIGNING_STORE_PASSWORD }}" 2>/dev/null; then
          echo "✅ 密钥文件验证成功"
        else
          echo "❌ 密钥文件验证失败"
          exit 1
        fi
        
        if keytool -list -keystore keystore.jks -alias "${{ secrets.SIGNING_KEY_ALIAS }}" -storepass "${{ secrets.SIGNING_STORE_PASSWORD }}" 2>/dev/null; then
          echo "✅ 密钥别名验证成功"
        else
          echo "❌ 密钥别名验证失败"
          exit 1
        fi
        
    - name: Download and prepare VLC Android source code
      run: |
        VERSION="${{ github.event.inputs.version }}"
        echo "=== 准备 VLC Android 源代码 v${VERSION} ==="
        echo "当前工作目录: $(pwd)"
        
        # 下载源代码
        echo "下载源代码: https://github.com/videolan/vlc-android/archive/refs/tags/${VERSION}.tar.gz"
        wget -q --show-progress https://github.com/videolan/vlc-android/archive/refs/tags/${VERSION}.tar.gz
        if [ $? -ne 0 ]; then
          echo "❌ 下载失败！"
          exit 1
        fi
        echo "✅ 下载完成"
        
        # 解压
        echo "解压源代码..."
        tar -xzf ${VERSION}.tar.gz
        if [ $? -ne 0 ]; then
          echo "❌ 解压失败！"
          exit 1
        fi
        echo "✅ 解压完成"
        
        # 重命名目录
        mv vlc-android-${VERSION} vlc-android
        rm ${VERSION}.tar.gz
        
        echo "✅ 源代码准备完成"
        echo "源代码目录: $(pwd)/vlc-android"
        echo "目录内容:"
        ls -la vlc-android/ | head -20
        
        # 复制密钥文件到 VLC 目录
        cp keystore.jks vlc-android/
        echo "✅ 密钥文件已复制到 vlc-android/"
        
        # 验证 VLC 源码完整性
        if [ -f "vlc-android/buildsystem/compile.sh" ]; then
          echo "✅ VLC 源码验证通过"
        else
          echo "❌ VLC 源码验证失败：找不到 buildsystem/compile.sh"
          exit 1
        fi
        
    - name: Configure VLC gradle for signing
      working-directory: ./vlc-android
      run: |
        echo "=== 配置签名信息 ==="
        echo "当前目录: $(pwd)"
        
        # 创建或追加 gradle.properties
        cat >> gradle.properties << EOF

        # Signing configuration for Release builds
        RELEASE_STORE_FILE=keystore.jks
        RELEASE_STORE_PASSWORD=${{ secrets.SIGNING_STORE_PASSWORD }}
        RELEASE_KEY_ALIAS=${{ secrets.SIGNING_KEY_ALIAS }}
        RELEASE_KEY_PASSWORD=${{ secrets.SIGNING_STORE_PASSWORD }}

        # Android settings
        android.useAndroidX=true
        android.enableJetifier=true
        org.gradle.jvmargs=-Xmx4g -XX:MaxMetaspaceSize=512m
        org.gradle.parallel=true
        org.gradle.caching=true
        EOF
        
        echo "✅ gradle.properties 配置完成"
        echo "配置文件内容:"
        cat gradle.properties
        
    - name: Build VLC (LibVLC + Medialibrary)
      working-directory: ./vlc-android
      run: |
        ABI="${{ github.event.inputs.abi }}"
        
        # 转换 ABI 名称
        case "$ABI" in
          arm64)
            VLC_ABI="arm64-v8a"
            ;;
          arm)
            VLC_ABI="armeabi-v7a"
            ;;
          x86)
            VLC_ABI="x86"
            ;;
          x86_64)
            VLC_ABI="x86_64"
            ;;
          *)
            echo "❌ 不支持的 ABI: $ABI"
            exit 1
            ;;
        esac
        
        echo "=== 开始编译 VLC 核心库 ==="
        echo "当前目录: $(pwd)"
        echo "选择的 ABI: $ABI -> $VLC_ABI"
        echo "开始时间: $(date)"
        
        # 确保编译脚本可执行
        chmod +x buildsystem/compile.sh
        
        # 编译 LibVLC
        echo "编译 LibVLC..."
        ./buildsystem/compile.sh -l -a $VLC_ABI
        
        if [ $? -ne 0 ]; then
          echo "❌ LibVLC 编译失败"
          exit 1
        fi
        
        # 编译 Medialibrary
        echo "编译 Medialibrary..."
        ./buildsystem/compile.sh -ml -a $VLC_ABI
        
        if [ $? -ne 0 ]; then
          echo "❌ Medialibrary 编译失败"
          exit 1
        fi
        
        echo "✅ VLC 核心库编译完成"
        echo "结束时间: $(date)"
      env:
        ANDROID_SDK: ${{ env.ANDROID_HOME }}
        ANDROID_NDK: ${{ env.ANDROID_NDK }}
        
    - name: Build Signed VLC Application APK
      working-directory: ./vlc-android
      run: |
        echo "=== 开始构建签名 APK ==="
        echo "当前目录: $(pwd)"
        
        # 确保 gradlew 可执行
        chmod +x gradlew
        
        # 清理之前的构建
        echo "清理之前的构建..."
        ./gradlew clean --no-daemon
        
        # 构建 Release 版本
        echo "构建 Release APK..."
        ./gradlew assembleRelease --no-daemon --stacktrace \
          -PreleaseStoreFile=keystore.jks \
          -PreleaseStorePassword="${{ secrets.SIGNING_STORE_PASSWORD }}" \
          -PreleaseKeyAlias="${{ secrets.SIGNING_KEY_ALIAS }}" \
          -PreleaseKeyPassword="${{ secrets.SIGNING_STORE_PASSWORD }}"
        
        if [ $? -eq 0 ]; then
          echo "✅ APK 构建完成"
        else
          echo "❌ APK 构建失败"
          exit 1
        fi
        
        # 显示构建产物
        echo ""
        echo "=== 构建产物列表 ==="
        find ./app/build/outputs/apk -name "*.apk" -type f -exec ls -lh {} \;
      env:
        ANDROID_SDK: ${{ env.ANDROID_HOME }}
        ANDROID_NDK: ${{ env.ANDROID_NDK }}
        
    - name: Find and prepare APK files
      id: prepare_apks
      working-directory: ./vlc-android
      run: |
        VERSION="${{ github.event.inputs.version }}"
        ABI="${{ github.event.inputs.abi }}"
        mkdir -p ../apk_output
        
        echo "=== 搜索 APK 文件 ==="
        echo "当前目录: $(pwd)"
        
        # 搜索所有 APK
        APK_COUNT=0
        echo "搜索路径: app/build/outputs/apk/"
        
        for apk in $(find ./app/build/outputs/apk -name "*.apk" -type f 2>/dev/null); do
          BASENAME=$(basename "$apk")
          FILE_SIZE=$(du -h "$apk" | cut -f1)
          FILE_SIZE_BYTES=$(stat -c%s "$apk" 2>/dev/null)
          
          # 只复制大于 1MB 的 APK（有效的 APK）
          if [ "$FILE_SIZE_BYTES" -gt 1048576 ]; then
            NEW_NAME="vlc-android-${VERSION}-${ABI}-${BASENAME}"
            cp "$apk" "../apk_output/${NEW_NAME}"
            echo "📱 APK: ${NEW_NAME} (大小: $FILE_SIZE)"
            APK_COUNT=$((APK_COUNT + 1))
          else
            echo "⚠️ 忽略小文件: $BASENAME (大小: $FILE_SIZE)"
          fi
        done
        
        if [ $APK_COUNT -gt 0 ]; then
          echo ""
          echo "=== 找到的 APK 文件 ==="
          ls -lh ../apk_output/
          echo "APK_COUNT=$APK_COUNT" >> $GITHUB_OUTPUT
        else
          echo "❌ 未找到任何有效的 APK 文件！"
          echo "调试信息："
          find . -name "*.apk" -type f -exec ls -lh {} \; 2>/dev/null || echo "没有找到任何 APK"
          exit 1
        fi
        
    - name: Upload APK as Artifact
      uses: actions/upload-artifact@v4
      with:
        name: vlc-android-${{ github.event.inputs.version }}-${{ github.event.inputs.abi }}
        path: apk_output/*.apk
        retention-days: 90
        if-no-files-found: error
        
    - name: Create package directory structure
      run: |
        # 创建包结构
        PACKAGE_DIR="maven-package"
        VERSION="${{ github.event.inputs.version }}"
        ABI="${{ github.event.inputs.abi }}"
        RELEASE_TITLE="${{ github.event.inputs.release_title }}"
        
        mkdir -p "${PACKAGE_DIR}"
        
        # 复制 APK 文件
        cp apk_output/*.apk "${PACKAGE_DIR}/"
        
        # 创建包描述文件
        if [ -z "$RELEASE_TITLE" ]; then
          RELEASE_TITLE="VLC Android ${VERSION} (${ABI})"
        fi
        
        cat > "${PACKAGE_DIR}/package.json" << PACKAGEEOF
        {
          "name": "vlc-android",
          "version": "${VERSION}",
          "abi": "${ABI}",
          "description": "${RELEASE_TITLE}",
          "build_date": "$(date -u +"%Y-%m-%dT%H:%M:%SZ")",
          "repository": "${{ github.repository }}"
        }
        PACKAGEEOF
        
        echo "✅ 包目录结构创建完成"
        ls -la "${PACKAGE_DIR}/"
        
    - name: Upload APK to GitHub Packages
      uses: actions/upload-artifact@v4
      with:
        name: vlc-android-package-${{ github.event.inputs.version }}-${{ github.event.inputs.abi }}
        path: maven-package/*
        retention-days: 0
        if-no-files-found: error
        
    - name: Publish to GitHub Packages
      run: |
        echo "=== 发布 APK 到 GitHub Packages ==="
        
        VERSION="${{ github.event.inputs.version }}"
        ABI="${{ github.event.inputs.abi }}"
        RELEASE_TITLE="${{ github.event.inputs.release_title }}"
        SAFE_VERSION=$(echo "${VERSION}" | sed 's/[^a-zA-Z0-9.]/-/g')
        
        if [ -z "$RELEASE_TITLE" ]; then
          RELEASE_TITLE="VLC Android ${VERSION} (${ABI})"
        fi
        
        # 设置包注册表
        echo "//npm.pkg.github.com/:_authToken=${{ secrets.GITHUB_TOKEN }}" > .npmrc
        echo "@${{ github.repository_owner }}:registry=https://npm.pkg.github.com" >> .npmrc
        
        # 创建 package.json 用于 npm 包发布
        cat > package.json << PACKAGEEOF
        {
          "name": "@${{ github.repository_owner }}/vlc-android-${ABI}",
          "version": "${SAFE_VERSION}",
          "description": "${RELEASE_TITLE}",
          "repository": {
            "type": "git",
            "url": "https://github.com/${{ github.repository }}.git"
          },
          "files": [
            "*.apk"
          ]
        }
        PACKAGEEOF
        
        # 复制 APK 文件到当前目录
        cp apk_output/*.apk .
        
        # 发布包
        npm publish --registry=https://npm.pkg.github.com/
        
        echo "✅ 包已发布到 GitHub Packages"
        
    - name: Cleanup
      if: always()
      run: |
        rm -f keystore.jks
        rm -rf vlc-android
        rm -rf android-ndk-r26d
        rm -rf apk_output
        rm -rf maven-package
        rm -f package.json
        rm -f .npmrc
        echo "🧹 清理完成"
