name: Build VLC Android APK

on:
  workflow_dispatch:
    inputs:
      abi:
        description: 'Target ABI'
        required: true
        default: 'arm64-v8a'
        type: choice
        options:
        - arm64-v8a
        - armeabi-v7a
        - x86_64
        - x86

env:
  VLC_VERSION: "3.7.1"
  ANDROID_SDK_ROOT: /usr/local/lib/android/sdk

# 取消之前的运行
concurrency:
  group: vlc-build-${{ github.event.inputs.abi }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest  # 改为 latest，可用 runner 更多
    timeout-minutes: 360
    
    steps:
    - name: Maximize build space
      uses: easimon/maximize-build-space@master
      with:
        root-reserve-mb: 1024
        swap-size-mb: 4096
        remove-dotnet: 'true'
        remove-android: 'false'
        remove-haskell: 'true'
        remove-codeql: 'true'

    - name: Setup JDK 11
      uses: actions/setup-java@v4
      with:
        java-version: '11'
        distribution: 'temurin'

    - name: Install Build Dependencies
      run: |
        sudo apt-get update -qq
        sudo apt-get install -y -qq \
          automake \
          ant \
          autopoint \
          cmake \
          build-essential \
          libtool-bin \
          patch \
          pkg-config \
          protobuf-compiler \
          ragel \
          subversion \
          unzip \
          git \
          flex \
          python3 \
          wget \
          gettext \
          nasm \
          meson \
          ninja-build \
          gperf \
          texinfo \
          yasm \
          bison \
          m4

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3
      with:
        packages: 'platforms;android-30 build-tools;30.0.3 platforms;android-33 build-tools;33.0.0 ndk;21.4.7075529'

    - name: Download VLC Android Source
      run: |
        echo "Downloading VLC Android ${VLC_VERSION}..."
        wget -q https://github.com/videolan/vlc-android/archive/refs/tags/${VLC_VERSION}.tar.gz
        tar -xzf ${VLC_VERSION}.tar.gz
        mv vlc-android-${VLC_VERSION} vlc-android
        rm ${VLC_VERSION}.tar.gz
        echo "Source downloaded and extracted"

    - name: Build VLC for ${{ github.event.inputs.abi }}
      working-directory: vlc-android
      env:
        ANDROID_SDK: ${{ env.ANDROID_SDK_ROOT }}
        ANDROID_NDK: ${{ env.ANDROID_SDK_ROOT }}/ndk/21.4.7075529
      run: |
        echo "Starting VLC build for ${{ github.event.inputs.abi }}..."
        echo "Build started at $(date)"
        bash buildsystem/compile.sh -l -r -a ${{ github.event.inputs.abi }}
        echo "Build completed at $(date)"

    - name: Build Application APK
      working-directory: vlc-android
      env:
        ANDROID_SDK: ${{ env.ANDROID_SDK_ROOT }}
        ANDROID_NDK: ${{ env.ANDROID_SDK_ROOT }}/ndk/21.4.7075529
      run: |
        echo "sdk.dir=$ANDROID_SDK_ROOT" > local.properties
        echo "ndk.dir=$ANDROID_NDK" >> local.properties
        
        echo "Building APK at $(date)..."
        ./gradlew assembleDev --no-daemon
        echo "APK build completed at $(date)"

    - name: Check APK output
      run: |
        echo "Checking for APK files..."
        find vlc-android/app/build/outputs/ -name "*.apk" -type f -exec ls -lh {} \;

    - name: Sign APK
      working-directory: vlc-android
      run: |
        echo "Preparing to sign APK..."
        
        # Decode keystore
        echo "${{ secrets.SIGNING_KEYSTORE_FILE }}" | base64 -d > release.keystore
        
        # Find APK file
        APK_FILE=$(find app/build/outputs/apk/ -name "*.apk" ! -name "*-unsigned*" -type f | head -n 1)
        
        if [ -z "$APK_FILE" ]; then
          echo "No APK found, searching more broadly..."
          APK_FILE=$(find app/build/outputs/ -name "*.apk" -type f | head -n 1)
        fi
        
        if [ -z "$APK_FILE" ]; then
          echo "Error: No APK file found!"
          find app/build/outputs/ -type f
          exit 1
        fi
        
        echo "Found APK: $APK_FILE"
        echo "Signing APK..."
        
        # Create output directory
        mkdir -p signed-apk
        
        # Sign APK
        $ANDROID_SDK_ROOT/build-tools/33.0.0/apksigner sign \
          --ks release.keystore \
          --ks-pass pass:${{ secrets.SIGNING_KEYSTORE_PASSWORD }} \
          --key-pass pass:${{ secrets.SIGNING_STORE_PASSWORD }} \
          --ks-key-alias ${{ secrets.SIGNING_KEY_ALIAS }} \
          --out signed-apk/vlc-android-${{ env.VLC_VERSION }}-${{ github.event.inputs.abi }}-signed.apk \
          "$APK_FILE"
        
        # Verify
        $ANDROID_SDK_ROOT/build-tools/33.0.0/apksigner verify --verbose \
          signed-apk/vlc-android-${{ env.VLC_VERSION }}-${{ github.event.inputs.abi }}-signed.apk
        
        echo "APK signed successfully!"
        ls -lh signed-apk/

    - name: Upload Signed APK
      uses: actions/upload-artifact@v4
      with:
        name: VLC-${{ env.VLC_VERSION }}-${{ github.event.inputs.abi }}-signed
        path: vlc-android/signed-apk/vlc-android-*-signed.apk
        retention-days: 30
