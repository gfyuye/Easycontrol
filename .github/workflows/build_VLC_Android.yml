name: Build VLC Android APK

on:
  workflow_dispatch:
    inputs:
      abi:
        description: 'Target ABI'
        required: true
        default: 'arm64-v8a'
        type: choice
        options:
        - arm64-v8a
        - armeabi-v7a
        - x86_64
        - x86

env:
  VLC_VERSION: "3.7.1"
  ANDROID_SDK_ROOT: /usr/local/lib/android/sdk
  ANDROID_NDK_VERSION: "27.2.12479018"

concurrency:
  group: vlc-build-${{ github.event.inputs.abi }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    
    steps:
    - name: Checkout (only for action reference)
      uses: actions/checkout@v4
      with:
        ref: ${{ github.event.repository.default_branch }}

    - name: Configure Git
      run: |
        git config --global user.email "github-actions@github.com"
        git config --global user.name "GitHub Actions"

    - name: Setup JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3
      with:
        packages: 'platforms;android-30 build-tools;30.0.3 platforms;android-33 build-tools;33.0.0 ndk;${{ env.ANDROID_NDK_VERSION }} cmake;3.22.1'

    - name: Install Build Dependencies
      run: |
        sudo apt-get update -qq
        
        # 安装基础依赖
        sudo apt-get install -y -qq \
          automake \
          ant \
          autopoint \
          cmake \
          build-essential \
          libtool \
          libtool-bin \
          libltdl-dev \
          patch \
          pkg-config \
          protobuf-compiler \
          ragel \
          subversion \
          unzip \
          git \
          flex \
          python3 \
          wget \
          gettext \
          nasm \
          meson \
          ninja-build \
          gperf \
          texinfo \
          yasm \
          bison \
          m4 \
          autoconf \
          autoconf-archive \
          libmpg123-dev \
          libmp3lame-dev \
          libvorbis-dev \
          libogg-dev \
          libtheora-dev \
          libx264-dev \
          libvpx-dev \
          libavcodec-dev \
          libavformat-dev \
          libswscale-dev \
          libavutil-dev

    - name: Fix libtool macros
      run: |
        # 确保 libtool 宏文件存在
        if [ ! -f /usr/share/aclocal/libtool.m4 ]; then
          echo "Copying libtool macros to aclocal directory..."
          sudo cp /usr/share/libtool/build-aux/libtool.m4 /usr/share/aclocal/ || true
          sudo cp /usr/share/libtool/build-aux/ltoptions.m4 /usr/share/aclocal/ || true
          sudo cp /usr/share/libtool/build-aux/ltsugar.m4 /usr/share/aclocal/ || true
          sudo cp /usr/share/libtool/build-aux/ltversion.m4 /usr/share/aclocal/ || true
          sudo cp /usr/share/libtool/build-aux/lt~obsolete.m4 /usr/share/aclocal/ || true
        fi
        
        # 更新 aclocal 数据库
        sudo aclocal --force
        
        # 检查 libtool 版本
        libtool --version
        autoconf --version
        automake --version

    - name: Download VLC Android Source
      run: |
        echo "Downloading VLC Android ${VLC_VERSION} from GitHub..."
        wget -q https://github.com/videolan/vlc-android/archive/refs/tags/${VLC_VERSION}.tar.gz
        tar -xzf ${VLC_VERSION}.tar.gz
        mv vlc-android-${VLC_VERSION} vlc-android
        rm ${VLC_VERSION}.tar.gz
        echo "Source downloaded and extracted successfully"

    - name: Build VLC for ${{ github.event.inputs.abi }}
      working-directory: vlc-android
      env:
        ANDROID_SDK: ${{ env.ANDROID_SDK_ROOT }}
        ANDROID_NDK: ${{ env.ANDROID_SDK_ROOT }}/ndk/${{ env.ANDROID_NDK_VERSION }}
        JAVA_HOME: ${{ env.JAVA_HOME }}
        ACLOCAL_PATH: "/usr/share/aclocal"
      run: |
        echo "Starting VLC build for ${{ github.event.inputs.abi }}..."
        echo "Build started at $(date)"
        echo "Using JAVA_HOME: $JAVA_HOME"
        echo "Using ANDROID_NDK: $ANDROID_NDK"
        echo "Java version: $(java -version 2>&1)"
        
        # 设置环境变量以帮助找到宏
        export ACLOCAL="aclocal -I /usr/share/aclocal"
        export AUTORECONF="autoreconf -I /usr/share/aclocal"
        
        bash buildsystem/compile.sh -l -r -a ${{ github.event.inputs.abi }}
        echo "Build completed at $(date)"

    - name: Build Application APK
      working-directory: vlc-android
      env:
        ANDROID_SDK: ${{ env.ANDROID_SDK_ROOT }}
        ANDROID_NDK: ${{ env.ANDROID_SDK_ROOT }}/ndk/${{ env.ANDROID_NDK_VERSION }}
        JAVA_HOME: ${{ env.JAVA_HOME }}
      run: |
        echo "sdk.dir=$ANDROID_SDK_ROOT" > local.properties
        echo "ndk.dir=$ANDROID_NDK" >> local.properties
        
        echo "Building APK at $(date)..."
        echo "Using Java: $(which java)"
        echo "Java version: $(java -version 2>&1)"
        
        export GRADLE_OPTS="-Dorg.gradle.jvmargs=-Xmx2048m"
        
        ./gradlew assembleDev --no-daemon --stacktrace
        echo "APK build completed at $(date)"

    - name: Find and Verify APK
      run: |
        echo "Searching for APK files..."
        find vlc-android/ -name "*.apk" -type f -exec ls -lh {} \;

    - name: Sign APK
      working-directory: vlc-android
      run: |
        echo "Preparing to sign APK..."
        
        # Decode keystore from secret
        echo "${{ secrets.SIGNING_KEYSTORE_FILE }}" | base64 -d > release.keystore
        
        # Find APK file
        APK_FILE=$(find . -name "*.apk" ! -name "*-unsigned*" ! -name "*-signed*" -type f | head -n 1)
        
        if [ -z "$APK_FILE" ]; then
          echo "Searching for any APK..."
          APK_FILE=$(find . -name "*.apk" -type f | head -n 1)
        fi
        
        if [ -z "$APK_FILE" ]; then
          echo "Error: No APK file found!"
          find . -type f -name "*.apk"
          exit 1
        fi
        
        echo "Found APK: $APK_FILE"
        echo "Signing APK..."
        
        # Create output directory
        mkdir -p signed-apk
        
        # Sign APK
        $ANDROID_SDK_ROOT/build-tools/33.0.0/apksigner sign \
          --ks release.keystore \
          --ks-pass pass:${{ secrets.SIGNING_KEYSTORE_PASSWORD }} \
          --key-pass pass:${{ secrets.SIGNING_STORE_PASSWORD }} \
          --ks-key-alias ${{ secrets.SIGNING_KEY_ALIAS }} \
          --out signed-apk/vlc-android-${{ env.VLC_VERSION }}-${{ github.event.inputs.abi }}-signed.apk \
          "$APK_FILE"
        
        # Verify signature
        $ANDROID_SDK_ROOT/build-tools/33.0.0/apksigner verify --verbose \
          signed-apk/vlc-android-${{ env.VLC_VERSION }}-${{ github.event.inputs.abi }}-signed.apk
        
        echo "APK signed successfully!"
        ls -lh signed-apk/

    - name: Upload Signed APK
      uses: actions/upload-artifact@v4
      with:
        name: VLC-${{ env.VLC_VERSION }}-${{ github.event.inputs.abi }}-signed
        path: vlc-android/signed-apk/vlc-android-*-signed.apk
        retention-days: 30
