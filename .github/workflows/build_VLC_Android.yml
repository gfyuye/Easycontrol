name: Build VLC Android APK

on:
  workflow_dispatch:
    inputs:
      abi:
        description: 'Target ABI'
        required: true
        default: 'all'
        type: choice
        options:
        - all
        - arm64-v8a
        - armeabi-v7a
        - x86_64
        - x86
  push:
    tags:
      - 'v*'

env:
  VLC_VERSION: "3.7.1"
  ANDROID_SDK_ROOT: /usr/local/lib/android/sdk
  ANDROID_NDK_VERSION: "21.4.7075529"

jobs:
  build:
    runs-on: ubuntu-20.04
    strategy:
      matrix:
        abi: [arm64-v8a, armeabi-v7a, x86_64, x86]
      fail-fast: false
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup JDK 8
      uses: actions/setup-java@v4
      with:
        java-version: '8'
        distribution: 'temurin'

    - name: Install Build Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          automake \
          ant \
          autopoint \
          cmake \
          build-essential \
          libtool-bin \
          patch \
          pkg-config \
          protobuf-compiler \
          ragel \
          subversion \
          unzip \
          git \
          flex \
          python \
          wget \
          gettext \
          nasm \
          meson \
          ninja-build \
          gperf \
          texinfo \
          yasm \
          bison

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3
      with:
        packages: 'platforms;android-30 build-tools;30.0.3 platforms;android-33 build-tools;33.0.0'

    - name: Setup NDK
      run: |
        ANDROID_NDK_HOME=$ANDROID_SDK_ROOT/ndk/${{ env.ANDROID_NDK_VERSION }}
        if [ ! -d "$ANDROID_NDK_HOME" ]; then
          echo "Installing NDK ${{ env.ANDROID_NDK_VERSION }}"
          yes | $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager --install "ndk;${{ env.ANDROID_NDK_VERSION }}"
        fi
        echo "ANDROID_NDK=$ANDROID_NDK_HOME" >> $GITHUB_ENV

    - name: Download VLC Android Source
      run: |
        wget https://github.com/videolan/vlc-android/archive/refs/tags/${VLC_VERSION}.tar.gz
        tar -xzf ${VLC_VERSION}.tar.gz
        mv vlc-android-${VLC_VERSION} vlc-android
        rm ${VLC_VERSION}.tar.gz

    - name: Build VLC for ${{ matrix.abi }}
      working-directory: vlc-android
      run: |
        export ANDROID_SDK=$ANDROID_SDK_ROOT
        export ANDROID_NDK=$ANDROID_NDK_HOME
        # Build LibVLC and Medialibrary with release flag
        bash buildsystem/compile.sh -l -ml -r -a ${{ matrix.abi }}

    - name: Build Application APK
      working-directory: vlc-android
      run: |
        export ANDROID_SDK=$ANDROID_SDK_ROOT
        export ANDROID_NDK=$ANDROID_NDK_HOME
        
        # Create local.properties
        echo "sdk.dir=$ANDROID_SDK_ROOT" > local.properties
        echo "ndk.dir=$ANDROID_NDK_HOME" >> local.properties
        
        # Build Dev variant (includes LibVLC and Medialibrary)
        ./gradlew assembleDev

    - name: Setup Keystore
      run: |
        # Decode the base64 keystore file
        echo "${{ secrets.SIGNING_KEYSTORE_FILE }}" | base64 -d > release.keystore

    - name: Sign APK
      uses: r0adkll/sign-android-release@v1
      with:
        releaseDirectory: vlc-android/app/build/outputs/apk/dev
        signingKeyBase64: ${{ secrets.SIGNING_KEYSTORE_FILE }}
        alias: ${{ secrets.SIGNING_KEY_ALIAS }}
        keyStorePassword: ${{ secrets.SIGNING_KEYSTORE_PASSWORD }}
        keyPassword: ${{ secrets.SIGNING_STORE_PASSWORD }}

    - name: Verify Signed APK
      run: |
        echo "Verifying signed APK..."
        ls -la vlc-android/app/build/outputs/apk/dev/
        # Check if APK is signed
        $ANDROID_SDK_ROOT/build-tools/33.0.0/apksigner verify --verbose vlc-android/app/build/outputs/apk/dev/*-signed.apk

    - name: Rename APK for ${{ matrix.abi }}
      run: |
        cd vlc-android/app/build/outputs/apk/dev/
        for apk in *-signed.apk; do
          mv "$apk" "vlc-android-${VLC_VERSION}-${{ matrix.abi }}-signed.apk"
        done

    - name: Upload APK as Artifact
      uses: actions/upload-artifact@v4
      with:
        name: VLC-Android-${{ matrix.abi }}
        path: vlc-android/app/build/outputs/apk/dev/vlc-android-*-${{ matrix.abi }}-signed.apk
        retention-days: 90

  create-release:
    needs: build
    runs-on: ubuntu-20.04
    if: startsWith(github.ref, 'refs/tags/')
    steps:
    - name: Download all artifacts
      uses: actions/download-artifact@v4
      with:
        path: all-apks
        pattern: VLC-Android-*

    - name: Display structure
      run: ls -R all-apks/

    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        name: VLC Android ${{ env.VLC_VERSION }}
        body: |
          VLC Android ${{ env.VLC_VERSION }} 自动编译版本
          
          ## 包含的架构
          - arm64-v8a (64位 ARM)
          - armeabi-v7a (32位 ARM)
          - x86_64 (64位 x86)
          - x86 (32位 x86)
          
          ## 构建信息
          - 构建时间: ${{ github.event.repository.updated_at }}
          - 提交: ${{ github.sha }}
        files: all-apks/**/*.apk
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish-to-packages:
    needs: build
    runs-on: ubuntu-20.04
    steps:
    - name: Download all artifacts
      uses: actions/download-artifact@v4
      with:
        path: packages
        pattern: VLC-Android-*

    - name: Publish to GitHub Packages
      uses: actions/upload-artifact@v4
      with:
        name: vlc-android-all-apks-${{ github.run_id }}
        path: packages/**/*.apk
        retention-days: 90
